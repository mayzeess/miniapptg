<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPG shop</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

        <header class="header">
            <h1 class="logo">Neponyatno Gang Store</h1>
            <p class="subtitle">Мини-приложение магазина одежды</p>
        </header>

        <section class="welcome-card">
            <h2>Добро пожаловать</h2>
            <p id="user-name">Загрузка пользователя...</p>
        </section>

        <section class="products-section">
            <h2>Каталог</h2>
            <div class="products-grid"></div>
        </section>

        <section class="cart-section">
            <h2>Корзина</h2>
            <div id="cart-items" class="cart-items">
                <p class="empty-cart">Корзина пока пуста</p>
            </div>

            <div class="cart-footer">
                <p class="total">Итого: <span id="total-price">0</span> руб</p>
                <button class="order-btn" id="order-btn">Оформить заказ</button>
            </div>
        </section>

    </div>

    <div id="order-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Оформление заказа</h2>

            <input id="name" type="text" placeholder="Имя">
            <input id="surname" type="text" placeholder="Фамилия">
            <input id="email" type="email" placeholder="Email">
            <input id="address" type="text" placeholder="Адрес доставки">

            <button id="continue-order" class="confirm-btn">Продолжить</button>
            <button id="close-modal" class="close-btn">Закрыть</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Проверьте заказ</h2>

            <div id="confirm-summary" class="confirm-summary"></div>

            <button id="final-confirm-order" class="confirm-btn">Оформить заказ</button>
            <button id="back-to-form" class="close-btn">Назад</button>
        </div>
    </div>

    <div id="success-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Заказ оформлен</h2>
            <p>Ваш заказ успешно отправлен.</p>
            <button id="close-success" class="confirm-btn">ОК</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
